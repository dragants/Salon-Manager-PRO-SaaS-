name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server (SSH)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          envs: PGHOST,PGPORT,PGUSER,PGDATABASE,PGPASSWORD
          script: |
            set -e
            cd /var/www/salon-app

            # ── Safe deploy: DB backup (optional) ──
            # Configure these GitHub Secrets to enable backups:
            # - PGHOST, PGPORT (optional), PGUSER, PGDATABASE, PGPASSWORD
            if command -v pg_dump >/dev/null 2>&1; then
              if [ -n "${PGHOST:-}" ] && [ -n "${PGUSER:-}" ] && [ -n "${PGDATABASE:-}" ] && [ -n "${PGPASSWORD:-}" ]; then
                TS="$(date +%F_%H-%M-%S)"
                BACKUP_DIR="/var/backups/salon-app"
                mkdir -p "$BACKUP_DIR"
                export PGPORT="${PGPORT:-5432}"
                export PGPASSWORD="$PGPASSWORD"
                echo "[deploy] Backing up DB to $BACKUP_DIR/backup_${TS}.sql"
                pg_dump -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" "$PGDATABASE" > "$BACKUP_DIR/backup_${TS}.sql"
                ln -sf "$BACKUP_DIR/backup_${TS}.sql" "$BACKUP_DIR/backup_latest.sql"
              else
                echo "[deploy] DB backup skipped (PG* secrets not set)."
              fi
            else
              echo "[deploy] DB backup skipped (pg_dump not installed on server)."
            fi

            git pull

            npm ci
            npm ci --prefix backend
            npm ci --prefix frontend

            # ── Controlled DB migrations (raw SQL) ──
            # Applies pending migrations from backend/sql/migrations via backend/scripts/run-sql-migration.cjs
            npm run migrate:sql --prefix backend

            npm test --prefix backend
            npx --prefix frontend vitest run
            npm run build --prefix frontend

            # Zero downtime (requires ecosystem.config.js on server)
            pm2 reload ecosystem.config.js

